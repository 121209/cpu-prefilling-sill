# Perf Profiler Skill Config

# Sampling frequency.
# 49Hz is a conservative value for long-running production profiling.
PERF_FREQ=49

# One perf.data slice duration.
# 5m is recommended for production.
PERF_SWITCH_DURATION=5m

# 288 * 5min = 24h retention.
PERF_RETENTION_COUNT=288

# Data directory.
PERF_DATA_DIR=/var/cache/perf-profiler

# Use software event for better compatibility in VM/cloud/WSL.
PERF_EVENT=cpu-clock

# Call graph mode:
# fp has lower overhead than dwarf and is better for always-on profiling.
PERF_CALLGRAPH=fp

# Explicit perf binary path.
PERF_BIN=/usr/local/bin/perf
